version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Gradle major version bumps are manual
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
      # JUnit major upgrades can break Gradle integration (launcher/engine mismatch)
      - dependency-name: "org.junit*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
