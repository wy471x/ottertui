name: Release

# Apache-style: manual trigger only, not automatic on tag push.
# The release manager triggers this after a successful PMC vote.

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
      next_dev_version:
        description: 'Next snapshot version (e.g. 0.2.0-SNAPSHOT)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v7

      - name: Validate version format
        run: |
          echo "${{ inputs.release_version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "Error: release_version must be semver (e.g. 0.1.0)"
            exit 1
          }
          echo "${{ inputs.next_dev_version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT$' || {
            echo "Error: next_dev_version must be snapshot (e.g. 0.2.0-SNAPSHOT)"
            exit 1
          }

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.release_version }}" >/dev/null 2>&1; then
            echo "Error: tag v${{ inputs.release_version }} already exists"
            exit 1
          fi

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set release version
        run: |
          sed -i "s/version = .*/version = \"${{ inputs.release_version }}\"/" build.gradle.kts
          grep -qF "version = \"${{ inputs.release_version }}\"" build.gradle.kts || {
            echo "Error: failed to set version in build.gradle.kts"
            exit 1
          }

      - name: Build and verify
        run: ./gradlew build checkstyleMain checkstyleTest

      - name: Generate checksums
        run: |
          for f in $(find . -path '*/build/libs/*.jar' -o -path '*/build/publications/*/*.pom'); do
            sha512sum "$f" > "$f.sha512"
          done

      - name: Publish to Maven Central
        run: ./gradlew publish
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.release_version }}
          name: v${{ inputs.release_version }}
          generate_release_notes: true
          files: |
            **/build/libs/*.jar
            **/build/libs/*.jar.sha512

      - name: Bump to next snapshot
        run: |
          sed -i "s/version = .*/version = \"${{ inputs.next_dev_version }}\"/" build.gradle.kts
          grep -qF "version = \"${{ inputs.next_dev_version }}\"" build.gradle.kts || {
            echo "Error: failed to set next snapshot version"
            exit 1
          }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "chore: bump version to ${{ inputs.next_dev_version }}"
          git push origin ${{ github.ref_name }}
